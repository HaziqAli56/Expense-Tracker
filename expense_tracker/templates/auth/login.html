{# login.html #}
{% extends "base.html" %}
{% block title %}Login — Expense Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center py-lg-3">
  <div class="col-md-5 col-lg-4">
    <div class="card border-0 shadow-sm p-4 p-md-5">
      <div class="text-center mb-4">
        <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary-subtle text-primary p-3 mb-2">
          <i class="bi bi-box-arrow-in-right fs-3" aria-hidden="true"></i>
        </span>
        <h1 class="h4 mb-0">Welcome back</h1>
        <p class="text-muted small mb-0">Login karke apna dashboard dekhein</p>
      </div>
      <form method="post" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label fw-medium" for="username">Username</label>
          <input class="form-control form-control-lg" id="username" name="username" required autocomplete="username" value="{{ last_username }}">
        </div>
        <div class="mb-3">
        
          <label class="form-label fw-medium" for="password">
            Password
          </label>
        
          <div class="input-group">
        
            <input
              type="password"
              class="form-control form-control-lg"
              id="password"
              name="password"
              required
              autocomplete="current-password"
            >
        
            <button
              class="btn btn-outline-secondary"
              type="button"
              id="togglePassword"
            >
              <i class="bi bi-eye"></i>
            </button>
        
          </div>
        
        </div>
        
        <script>
        
          const togglePassword =
            document.getElementById("togglePassword");
        
          const password =
            document.getElementById("password");
        
          const icon =
            togglePassword.querySelector("i");
        
          togglePassword.addEventListener("click", function () {
        
            const type =
              password.getAttribute("type") === "password"
              ? "text"
              : "password";
        
            password.setAttribute("type", type);
        
            if (type === "text") {
        
              icon.classList.remove("bi-eye");
              icon.classList.add("bi-eye-slash");
        
            } else {
        
              icon.classList.remove("bi-eye-slash");
              icon.classList.add("bi-eye");
        
            }
        
          });
        
        </script>

<button
    type="submit"
    class="btn btn-primary w-100 btn-lg"
    onclick="this.disabled=true; this.innerText='Loading...'; this.form.submit();"
>

    Login

</button>

      </form>
      <p class="mt-4 mb-0 text-center small text-muted">Naya account? <a href="{{ url_for('auth.register') }}">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
